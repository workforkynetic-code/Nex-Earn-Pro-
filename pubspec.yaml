name: nex_earn_pro
description: Nex Earn Pro - Daily Earning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  firebase_database: ^10.4.9
  google_sign_in: ^6.2.1

  # Ads
  unity_ads_plugin: ^4.9.3

  # WebView
  webview_flutter: ^4.4.4

  # Storage & Prefs
  shared_preferences: ^2.2.3

  # Network
  http: ^1.2.0

  # Sharing
  share_plus: ^7.2.2

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Crypto & Security
  crypto: ^3.0.3
  device_info_plus: ^10.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
